<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT 스터디 그룹</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #faf8f3;
    --warm: #f5f0e8;
    --accent: #c84b31;
    --gold: #d4a843;
    --muted: #8a8070;
    --border: #e0d8c8;
    --green: #4a7c59;
    --blue: #2d5f8a;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Noto Sans KR’, sans-serif;
background: var(–paper);
color: var(–ink);
min-height: 100vh;
}

/* HEADER */
header {
background: var(–ink);
color: var(–paper);
padding: 20px 24px 16px;
position: sticky;
top: 0;
z-index: 100;
border-bottom: 3px solid var(–gold);
}
.header-top {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 4px;
}
.logo {
font-family: ‘Noto Serif JP’, serif;
font-size: 22px;
letter-spacing: 2px;
color: var(–gold);
}
.logo span {
font-family: ‘DM Serif Display’, serif;
font-size: 13px;
color: #aaa;
display: block;
letter-spacing: 1px;
margin-top: 2px;
}
.today-badge {
font-size: 11px;
background: var(–accent);
color: white;
padding: 4px 10px;
border-radius: 20px;
font-weight: 500;
}

/* NAV TABS */
nav {
display: flex;
background: var(–warm);
border-bottom: 1px solid var(–border);
overflow-x: auto;
}
nav button {
flex: 1;
min-width: 80px;
padding: 12px 8px;
border: none;
background: transparent;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 12px;
font-weight: 500;
color: var(–muted);
cursor: pointer;
transition: all 0.2s;
border-bottom: 3px solid transparent;
white-space: nowrap;
}
nav button.active {
color: var(–accent);
border-bottom-color: var(–accent);
background: white;
font-weight: 700;
}
nav button:hover:not(.active) {
color: var(–ink);
background: var(–border);
}

/* MAIN */
main { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

/* SECTIONS */
.section { display: none; }
.section.active { display: block; animation: fadeUp 0.3s ease; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

/* CARDS */
.card {
background: white;
border: 1px solid var(–border);
border-radius: 12px;
padding: 16px;
margin-bottom: 14px;
box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.card-title {
font-size: 11px;
font-weight: 700;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 1.5px;
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 6px;
}
.card-title::before {
content: ‘’;
display: inline-block;
width: 3px;
height: 12px;
background: var(–accent);
border-radius: 2px;
}

/* ===== HOME ===== */
.welcome-strip {
background: linear-gradient(135deg, var(–ink) 0%, #2d2d4e 100%);
border-radius: 14px;
padding: 20px;
margin-bottom: 14px;
color: white;
position: relative;
overflow: hidden;
}
.welcome-strip::after {
content: ‘日本語’;
position: absolute;
right: -10px;
top: 50%;
transform: translateY(-50%) rotate(15deg);
font-family: ‘Noto Serif JP’, serif;
font-size: 48px;
color: rgba(255,255,255,0.06);
pointer-events: none;
}
.welcome-strip h2 {
font-size: 18px;
font-weight: 700;
margin-bottom: 4px;
}
.welcome-strip p {
font-size: 12px;
color: rgba(255,255,255,0.6);
}
.stats-row {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
margin-top: 14px;
}
.stat-box {
background: rgba(255,255,255,0.1);
border-radius: 8px;
padding: 10px;
text-align: center;
}
.stat-box .num {
font-family: ‘DM Serif Display’, serif;
font-size: 24px;
color: var(–gold);
display: block;
}
.stat-box .lbl {
font-size: 10px;
color: rgba(255,255,255,0.6);
margin-top: 2px;
}

/* ===== ATTENDANCE ===== */
.session-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
}
.session-date-badge {
background: var(–accent);
color: white;
font-size: 11px;
font-weight: 700;
padding: 4px 10px;
border-radius: 20px;
}
.member-row {
display: flex;
align-items: center;
padding: 12px 0;
border-bottom: 1px solid var(–border);
gap: 12px;
}
.member-row:last-child { border-bottom: none; }
.avatar {
width: 38px;
height: 38px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Noto Serif JP’, serif;
font-size: 16px;
font-weight: 600;
flex-shrink: 0;
}
.avatar.a { background: #fce8e3; color: var(–accent); }
.avatar.b { background: #e3f0e8; color: var(–green); }
.avatar.c { background: #e3eaf5; color: var(–blue); }

.member-info { flex: 1; }
.member-name { font-size: 14px; font-weight: 600; }
.member-sub { font-size: 11px; color: var(–muted); margin-top: 2px; }

.check-btn {
width: 36px;
height: 36px;
border-radius: 50%;
border: 2px solid var(–border);
background: white;
cursor: pointer;
font-size: 16px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
flex-shrink: 0;
}
.check-btn.checked {
background: var(–green);
border-color: var(–green);
color: white;
}
.check-btn:hover { transform: scale(1.1); }

.attendance-history { margin-top: 6px; }
.history-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 0;
border-bottom: 1px solid var(–border);
font-size: 13px;
}
.history-item:last-child { border-bottom: none; }
.history-date { color: var(–muted); font-size: 11px; }
.history-dots { display: flex; gap: 4px; }
.dot {
width: 22px;
height: 22px;
border-radius: 50%;
font-size: 10px;
display: flex;
align-items: center;
justify-content: center;
font-weight: 700;
}
.dot.present { background: var(–green); color: white; }
.dot.absent { background: #f0ebe3; color: var(–muted); }

/* ===== CALENDAR ===== */
.cal-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
}
.cal-month {
font-family: ‘DM Serif Display’, serif;
font-size: 20px;
color: var(–ink);
}
.cal-nav {
background: none;
border: 1px solid var(–border);
border-radius: 8px;
padding: 6px 12px;
cursor: pointer;
font-size: 14px;
color: var(–ink);
}
.cal-nav:hover { background: var(–warm); }
.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 2px;
text-align: center;
}
.cal-day-label {
font-size: 10px;
font-weight: 700;
color: var(–muted);
padding: 6px 0;
text-transform: uppercase;
}
.cal-day-label:first-child { color: var(–accent); }
.cal-day-label:last-child { color: var(–blue); }
.cal-cell {
aspect-ratio: 1;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
border-radius: 8px;
cursor: pointer;
position: relative;
transition: background 0.15s;
}
.cal-cell:hover:not(.empty) { background: var(–warm); }
.cal-cell.today {
background: var(–accent);
color: white;
font-weight: 700;
}
.cal-cell.has-event::after {
content: ‘’;
position: absolute;
bottom: 3px;
width: 4px;
height: 4px;
background: var(–gold);
border-radius: 50%;
}
.cal-cell.today.has-event::after { background: white; }
.cal-cell.other-month { color: var(–border); }

.event-list { margin-top: 14px; }
.event-item {
display: flex;
gap: 12px;
align-items: flex-start;
padding: 10px 0;
border-bottom: 1px solid var(–border);
}
.event-item:last-child { border-bottom: none; }
.event-dot {
width: 8px;
height: 8px;
border-radius: 50%;
margin-top: 5px;
flex-shrink: 0;
}
.event-dot.study { background: var(–accent); }
.event-dot.exam { background: var(–gold); }
.event-dot.etc { background: var(–blue); }
.event-text { flex: 1; }
.event-title { font-size: 13px; font-weight: 600; }
.event-meta { font-size: 11px; color: var(–muted); margin-top: 2px; }

/* Add event form */
.add-form {
margin-top: 12px;
padding-top: 12px;
border-top: 1px dashed var(–border);
display: none;
}
.add-form.open { display: block; }
.form-row { margin-bottom: 10px; }
.form-row label { font-size: 11px; color: var(–muted); display: block; margin-bottom: 4px; font-weight: 600; }
.form-row input, .form-row select, .form-row textarea {
width: 100%;
padding: 8px 10px;
border: 1px solid var(–border);
border-radius: 8px;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 13px;
color: var(–ink);
background: var(–warm);
outline: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
border-color: var(–accent);
background: white;
}

/* ===== NOTICES ===== */
.notice-item {
padding: 14px 0;
border-bottom: 1px solid var(–border);
}
.notice-item:last-child { border-bottom: none; }
.notice-top {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 6px;
}
.notice-tag {
font-size: 10px;
font-weight: 700;
padding: 2px 8px;
border-radius: 10px;
letter-spacing: 0.5px;
}
.notice-tag.announce { background: #fce8e3; color: var(–accent); }
.notice-tag.memo { background: #e3f0e8; color: var(–green); }
.notice-tag.quiz { background: #fef8e7; color: #b8860b; }
.notice-date { font-size: 10px; color: var(–muted); }
.notice-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.notice-body { font-size: 12px; color: var(–muted); line-height: 1.6; }
.notice-author {
font-size: 10px;
color: var(–muted);
margin-top: 6px;
display: flex;
align-items: center;
gap: 4px;
}

/* BUTTONS */
.btn-primary {
background: var(–accent);
color: white;
border: none;
border-radius: 10px;
padding: 10px 18px;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 13px;
font-weight: 700;
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
gap: 6px;
}
.btn-primary:hover { background: #b03d26; transform: translateY(-1px); }
.btn-outline {
background: transparent;
color: var(–accent);
border: 1.5px solid var(–accent);
border-radius: 10px;
padding: 8px 16px;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: all 0.2s;
}
.btn-outline:hover { background: #fce8e3; }

.btn-row {
display: flex;
gap: 8px;
justify-content: flex-end;
margin-top: 10px;
}

/* PROGRESS BAR */
.progress-wrap { margin-top: 8px; }
.progress-label {
display: flex;
justify-content: space-between;
font-size: 11px;
color: var(–muted);
margin-bottom: 4px;
}
.progress-bar {
height: 6px;
background: var(–border);
border-radius: 10px;
overflow: hidden;
margin-bottom: 10px;
}
.progress-fill {
height: 100%;
border-radius: 10px;
transition: width 0.5s ease;
}
.fill-accent { background: var(–accent); }
.fill-green { background: var(–green); }
.fill-blue { background: var(–blue); }

/* TOAST */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–ink);
color: white;
padding: 10px 20px;
border-radius: 24px;
font-size: 13px;
font-weight: 500;
z-index: 999;
transition: transform 0.3s ease;
white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.section-subtitle {
font-size: 11px;
color: var(–muted);
margin-bottom: 16px;
}

/* ===== LECTURE ===== */
.lec-tabs {
display: flex;
gap: 6px;
margin-bottom: 14px;
}
.lec-tab {
flex: 1;
padding: 8px 4px;
border: 1.5px solid var(–border);
border-radius: 10px;
background: white;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 12px;
font-weight: 600;
color: var(–muted);
cursor: pointer;
transition: all 0.2s;
text-align: center;
}
.lec-tab.active { border-color: var(–accent); color: var(–accent); background: #fce8e3; }

.lec-subject-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 10px;
}
.lec-badge {
font-size: 11px;
font-weight: 700;
padding: 3px 10px;
border-radius: 12px;
}
.lec-badge.grammar { background: #fce8e3; color: var(–accent); }
.lec-badge.reading { background: #e3eaf5; color: var(–blue); }
.lec-badge.listening { background: #e3f0e8; color: var(–green); }

.lec-goal-row {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 10px;
flex-wrap: wrap;
}
.lec-goal-row label { font-size: 11px; color: var(–muted); font-weight: 600; white-space: nowrap; }
.lec-goal-row input {
width: 60px;
padding: 5px 8px;
border: 1px solid var(–border);
border-radius: 8px;
font-size: 13px;
font-family: ‘Noto Sans KR’, sans-serif;
background: var(–warm);
color: var(–ink);
outline: none;
}
.lec-goal-row input:focus { border-color: var(–accent); background: white; }
.lec-goal-row span { font-size: 12px; color: var(–muted); }

.lec-today-row {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 14px;
}
.lec-count-btn {
width: 34px;
height: 34px;
border-radius: 50%;
border: 1.5px solid var(–border);
background: white;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-weight: 700;
transition: all 0.15s;
color: var(–ink);
}
.lec-count-btn:hover { background: var(–warm); border-color: var(–accent); }
.lec-count-num {
font-family: ‘DM Serif Display’, serif;
font-size: 28px;
color: var(–ink);
min-width: 36px;
text-align: center;
}
.lec-count-label { font-size: 11px; color: var(–muted); }

.lec-ring-wrap {
display: flex;
justify-content: center;
gap: 20px;
margin: 10px 0 14px;
}
.lec-ring-item { text-align: center; }
.lec-ring-label { font-size: 11px; color: var(–muted); margin-top: 6px; font-weight: 600; }

.lec-log-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 9px 0;
border-bottom: 1px solid var(–border);
font-size: 13px;
}
.lec-log-item:last-child { border-bottom: none; }
.lec-log-date { font-size: 11px; color: var(–muted); }
.lec-chips { display: flex; gap: 6px; }
.lec-chip {
font-size: 11px;
font-weight: 700;
padding: 2px 8px;
border-radius: 10px;
}
.lec-chip.grammar { background: #fce8e3; color: var(–accent); }
.lec-chip.reading { background: #e3eaf5; color: var(–blue); }
.lec-chip.listening { background: #e3f0e8; color: var(–green); }
</style>

</head>

// Firebase helpers
async function fbSet(col, docId, data) {
  await setDoc(doc(db, col, docId), data);
}
async function fbGet(col, docId) {
  const snap = await getDoc(doc(db, col, docId));
  return snap.exists() ? snap.data() : null;
}
async function fbGetAll(col) {
  const snap = await getDocs(collection(db, col));
  return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
}
async function fbAdd(col, data) {
  return await addDoc(collection(db, col), data);
}
async function fbDel(col, docId) {
  await deleteDoc(doc(db, col, docId));
}
function fbListen(col, cb) {
  return onSnapshot(collection(db, col), snap => {
    cb(snap.docs.map(d => ({ _id: d.id, ...d.data() })));
  });
}

// Local state (synced from Firebase)
let attendance = [];
let events = [];
let notices = [];
let lecGoals = { grammar: 3, reading: 2, listening: 2 };
let lecTotals = { grammar: 60, reading: 40, listening: 30 };
let lecLog = [];

let todayChecks = {};
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// ===== UTILS =====
function fmt(d) {
  return d.toISOString().split('T')[0];
}
function today() { return fmt(new Date()); }
function korDate(str) {
  const d = new Date(str + 'T00:00:00');
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

// ===== NAV =====
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'calendar') renderCalendar();
  if (id === 'home') renderHome();
  if (id === 'attendance') renderAttendance();
  if (id === 'notices') renderNotices();
  if (id === 'lecture') initLecture();
}

// ===== HOME =====
function renderHome() {
  const total = attendance.length;
  document.getElementById('statTotal').textContent = total;

  const myPct = total === 0 ? 0 : Math.round(
    attendance.filter(s => s.checks[MEMBERS[0].id]).length / total * 100
  );
  document.getElementById('statMyRate').textContent = myPct + '%';

  const upcoming = events
    .filter(e => e.date >= today())
    .sort((a, b) => a.date.localeCompare(b.date));
  const next = upcoming[0];
  if (next) {
    const diff = Math.ceil((new Date(next.date + 'T00:00:00') - new Date()) / 86400000);
    document.getElementById('statDDay').textContent = diff === 0 ? '오늘' : `D-${diff}`;
  }

  // Member progress
  const mp = document.getElementById('memberProgress');
  mp.innerHTML = '';
  MEMBERS.forEach(m => {
    const cnt = attendance.filter(s => s.checks[m.id]).length;
    const pct = total === 0 ? 0 : Math.round(cnt / total * 100);
    mp.innerHTML += `
      <div class="progress-wrap">
        <div class="progress-label"><span>${m.name}</span><span>${cnt}/${total} (${pct}%)</span></div>
        <div class="progress-bar"><div class="progress-fill fill-${m.cls === 'a' ? 'accent' : m.cls === 'b' ? 'green' : 'blue'}" style="width:${pct}%"></div></div>
      </div>`;
  });

  // Upcoming
  const ue = document.getElementById('upcomingEvents');
  if (upcoming.length === 0) {
    ue.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">등록된 일정이 없어요</p>';
  } else {
    ue.innerHTML = upcoming.slice(0, 3).map(e => `
      <div class="event-item">
        <div class="event-dot ${e.type}"></div>
        <div class="event-text">
          <div class="event-title">${e.title}</div>
          <div class="event-meta">${korDate(e.date)}${e.memo ? ' · ' + e.memo : ''}</div>
        </div>
      </div>`).join('');
  }
}

// ===== ATTENDANCE =====
function renderAttendance() {
  document.getElementById('sessionDate').textContent = korDate(today());
  
  const mc = document.getElementById('memberChecks');
  mc.innerHTML = '';
  MEMBERS.forEach(m => {
    mc.innerHTML += `
      <div class="member-row">
        <div class="avatar ${m.cls}">${m.avatar}</div>

  btn.classList.toggle('checked');

}

async function saveAttendance() {
  const record = { date: today(), checks: { ...todayChecks } };
  await fbSet('attendance', today(), record);
  showToast('✅ 출석이 저장됐어요!');

function renderHistory() {
  const el = document.getElementById('attendanceHistory');
  const sorted = [...attendance].sort((a, b) => b.date.localeCompare(a.date));

        <div class="history-date">${s.date}</div>
      </div>
      <div class="history-dots">
        ${MEMBERS.map(m => `<div class="dot ${s.checks[m.id] ? 'present' : 'absent'}" title="${m.name}">${m.avatar}</div>`).join('')}
      </div>
    </div>`).join('');
}

// ===== CALENDAR =====
function renderCalendar() {
  const label = document.getElementById('calMonthLabel');
  label.textContent = `${calYear}년 ${calMonth + 1}월`;

  const grid = document.getElementById('calGrid');
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  let html = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  const first = new Date(calYear, calMonth, 1).getDay();
  const last = new Date(calYear, calMonth + 1, 0).getDate();
  const todayStr = today();

  for (let i = 0; i < first; i++) html += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= last; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const hasEvent = events.some(e => e.date === ds);
    html += `<div class="cal-cell ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}">${d}</div>`;
  }
  grid.innerHTML = html;
  renderEventList();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderEventList() {
  const el = document.getElementById('eventList');
  const monthStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthEvents = events
    .filter(e => e.date.startsWith(monthStr))
    .sort((a, b) => a.date.localeCompare(b.date));

  if (monthEvents.length === 0) {
    el.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">이달 일정 없음</p>';
    return;
  }
  el.innerHTML = monthEvents.map(e => `
    <div class="event-item">
      <div class="event-dot ${e.type}"></div>
      <div class="event-text">
        <div class="event-title">${e.title}</div>
        <div class="event-meta">${korDate(e.date)}${e.memo ? ' · ' + e.memo : ''}</div>
      </div>
      <button onclick="deleteEvent('${e._id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px">×</button>
    </div>`).join('');
}

// ===== LECTURE =====
const SUBJECTS = ['grammar', 'reading', 'listening'];
const SUBJECT_KOR = { grammar: '문법', reading: '독해', listening: '청해' };

let lecGoals = loadData('jlpt_lecGoals', { grammar: 3, reading: 2, listening: 2 });
let lecTotals = loadData('jlpt_lecTotals', { grammar: 60, reading: 40, listening: 30 });
let lecLog = loadData('jlpt_lecLog', []); // [{date, grammar, reading, listening}]
let todayLec = { grammar: 0, reading: 0, listening: 0 };
let curSubject = 'grammar';

function selectSubject(subj, btn) {
  curSubject = subj;
  document.querySelectorAll('.lec-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  SUBJECTS.forEach(s => {
    document.getElementById('lec-' + s).style.display = s === subj ? 'block' : 'none';
  });
}

function saveGoal(subj) { /* handled by async version above */ }

function addCount(subj, delta) {
  todayLec[subj] = Math.max(0, todayLec[subj] + delta);
  document.getElementById('cnt-' + subj).textContent = todayLec[subj];
  renderRing(subj);
}

function renderRing(subj) {
  const done = todayLec[subj];
  const goal = lecGoals[subj];
  const pct = Math.min(100, Math.round(done / goal * 100));
  const color = subj === 'grammar' ? '#c84b31' : subj === 'reading' ? '#2d5f8a' : '#4a7c59';
  const r = 28, cx = 34, cy = 34, stroke = 6;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  const el = document.getElementById('ring-' + subj);
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;padding:4px 0">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f0ebe3" stroke-width="${stroke}"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
          stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
          stroke-linecap="round" style="transition:stroke-dasharray 0.4s ease"/>
        <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="700" fill="${color}" font-family="DM Serif Display,serif">${pct}%</text>
      </svg>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--ink)">${done} / ${goal}강 완료</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${done >= goal ? '🎉 오늘 목표 달성!' : `${goal - done}강 남았어요`}</div>
      </div>
    </div>`;
}

async function saveLecture() {
  await fbSet('lecLog', today(), { date: today(), ...todayLec });
  await fbSet('lecSettings', 'goals', { goals: lecGoals, totals: lecTotals });
  showToast('📺 인강 기록 저장됐어요!');
}

async function saveGoal(subj) {
  lecGoals[subj] = parseInt(document.getElementById('goal-' + subj).value) || 1;
  lecTotals[subj] = parseInt(document.getElementById('total-' + subj).value) || 1;
  await fbSet('lecSettings', 'goals', { goals: lecGoals, totals: lecTotals });
  renderRing(subj);
  renderOverallProgress();
}

function renderOverallProgress() {
  const el = document.getElementById('overallProgress');
  el.innerHTML = SUBJECTS.map(s => {
    const total = lecLog.reduce((sum, l) => sum + (l[s] || 0), 0);
    const totalCap = lecTotals[s];
    const pct = Math.min(100, Math.round(total / totalCap * 100));
    const color = s === 'grammar' ? 'accent' : s === 'reading' ? 'blue' : 'green';
    return `
      <div class="progress-wrap">
        <div class="progress-label">
          <span>${SUBJECT_KOR[s]}</span>
          <span>${total} / ${totalCap}강 (${pct}%)</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill fill-${color}" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');
}

function renderLectureLog() {
  const el = document.getElementById('lectureLog');
  const sorted = [...lecLog].sort((a, b) => b.date.localeCompare(a.date));
  if (sorted.length === 0) {
    el.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">아직 기록이 없어요</p>';
    return;
  }
  el.innerHTML = sorted.slice(0, 10).map(l => `
    <div class="lec-log-item">
      <div>
        <div style="font-size:13px;font-weight:600">${korDate(l.date)}</div>
        <div class="lec-log-date">${l.date}</div>
      </div>
      <div class="lec-chips">
        ${l.grammar ? `<span class="lec-chip grammar">文 ${l.grammar}강</span>` : ''}
        ${l.reading ? `<span class="lec-chip reading">読 ${l.reading}강</span>` : ''}
        ${l.listening ? `<span class="lec-chip listening">聴 ${l.listening}강</span>` : ''}
      </div>
    </div>`).join('');
}

function initLecture() {
  // load today's existing log
  const existing = lecLog.find(l => l.date === today());
  if (existing) {
    todayLec = { grammar: existing.grammar || 0, reading: existing.reading || 0, listening: existing.listening || 0 };
  }
  SUBJECTS.forEach(s => {
    document.getElementById('goal-' + s).value = lecGoals[s];
    document.getElementById('total-' + s).value = lecTotals[s];
    document.getElementById('cnt-' + s).textContent = todayLec[s];
    renderRing(s);
  });
  renderOverallProgress();
  renderLectureLog();
}

  const t = document.getElementById('toast');

    <div style="font-size:32px;margin-bottom:12px">🔥</div>
    <div style="font-size:14px;font-weight:600">Firebase 연결 중...</div>
  </div>`;

async function initApp() {
  // Load lecture settings
  const lecSettings = await fbGet('lecSettings', 'goals');
  if (lecSettings) {
    lecGoals = lecSettings.goals || lecGoals;
    lecTotals = lecSettings.totals || lecTotals;
  }

  // Restore main HTML
  document.querySelector('main').innerHTML = mainHTML;

  // Realtime: attendance
  fbListen('attendance', docs => {
    attendance = docs;
    renderHistory();
    renderHome();
  });

  // Realtime: events
  fbListen('events', docs => {
    events = docs;
    renderCalendar();
    renderHome();
  });

  // Realtime: notices
  fbListen('notices', docs => {
    notices = docs;
    renderNotices();
  });

  // Realtime: lecLog
  fbListen('lecLog', docs => {
    lecLog = docs;
    renderOverallProgress();
    renderLectureLog();
  });

  renderHome();
  renderHistory();
}
